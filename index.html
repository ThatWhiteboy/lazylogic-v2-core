<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lazy Logic AI | System Status</title><style>body{background:#0d0d0d;color:#00ff41;font-family:monospace;padding:20px;text-align:center}h1{border-bottom:2px solid #00ff41;padding-bottom:10px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:20px}.card{border:1px solid #333;padding:15px;background:#1a1a1a}.card:hover{border-color:#00ff41}.status{width:10px;height:10px;background:#00ff41;border-radius:50%;display:inline-block;box-shadow:0 0 5px #00ff41}</style></head><body><h1>LAZY LOGIC // AUTONOMOUS STATUS</h1><div id="loading">CONNECTING TO HIVE MIND...</div><div id="grid" class="grid"></div><script>fetch("manifest.json").then(r=>r.json()).then(d=>{document.getElementById("loading").style.display="none";const g=document.getElementById("grid");d.bot_roster.forEach(b=>{const c=document.createElement("div");c.innerHTML=`<strong>${b.id}</strong><br><span style="color:#aaa;font-size:0.8em">${b.role}</span><br><div class="status"></div> ${b.status}`;c.className="card";g.appendChild(c);});}).catch(e=>document.getElementById("loading").innerHTML="ERROR: MANIFEST NOT FOUND");</script></body></html>
