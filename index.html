<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyLogic.ai | Automate the work. Keep the wins.</title>
    <style>
        :root { --bg: #03030b; --accent: #3b82f6; --glow: rgba(59, 130, 246, 0.4); }
        body { margin: 0; font-family: "Inter", sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        .nav { padding: 30px 10%; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.4rem; }
        .logo img { height: 45px; }
        .hero { display: flex; align-items: center; padding: 60px 10%; min-height: 80vh; gap: 40px; }
        .hero-content { flex: 1; }
        .hero-content h1 { font-size: 4rem; line-height: 1.1; margin-bottom: 24px; background: linear-gradient(to right, #fff, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-content p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 40px; max-width: 500px; line-height: 1.6; }
        .cta-btn { padding: 18px 36px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 50px; text-decoration: none; color: white; font-weight: 700; box-shadow: 0 0 30px var(--glow); transition: 0.3s; display: inline-block; border: none; }
        .hero-visual { flex: 1; position: relative; }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            padding: 40px; 
            backdrop-filter: blur(12px); 
            transform: perspective(1000px) rotateY(-20deg) rotateX(10deg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .feature-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 80px 10%; }
        .feature-card { background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid #1e293b; text-align: center; }
        .footer-section { text-align: center; padding: 100px 10%; border-top: 1px solid #1e293b; }
        input { padding: 16px 24px; border-radius: 50px; border: 1px solid #334155; background: #0f172a; color: white; width: 300px; }
    </style>
</head>
<body>
    <div class="nav"><div class="logo"><img src="logo.png" onerror="this.src=\"https://via.placeholder.com/45?text=AI\""> LazyLogic.ai</div></div>
    <section class="hero">
        <div class="hero-content">
            <h1>Automate the work.<br>Keep the wins.</h1>
            <p>LazyLogic AI connects your tools, thinks through the logic, and executes workflows so you can grow on autopilot.</p>
            <button class="cta-btn">Start free with AI flows</button>
        </div>
        <div class="hero-visual">
            <div class="glass-panel">
                <div style="height:250px; width:100%; border:1px dashed #3b82f6; display:flex; align-items:center; justify-content:center; color:#3b82f6;">[ WORKFLOW VISUALIZATION ]</div>
            </div>
        </div>
    </section>
    <div class="footer-section">
        <h2>Prompt-first automation breaks.<br>Logic-first automation scales.</h2>
        <div style="margin-top: 40px;"><input type="email" placeholder="Enter your email"> <button class="cta-btn" style="padding:16px 24px;">Request Access</button></div>
    </div>
</body>
</html>
