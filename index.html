<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lazy Logic AI | Command Center</title><style>@import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap");:root{--bg:#050508;--panel:rgba(22,22,26,0.7);--accent:#7c3aed;--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.1);--text:#e2e8f0}body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;margin:0;padding:40px;background-image:radial-gradient(circle at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 50%);overflow-x:hidden}header{max-width:1200px;margin:0 auto 60px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:30px}.logo-area{display:flex;align-items:center;gap:20px}.logo-img{width:70px;height:70px;border-radius:18px;border:1px solid var(--accent);box-shadow:0 0 30px rgba(124,58,237,0.4);background:#16161a;display:flex;align-items:center;justify-content:center}.tagline{font-style:italic;opacity:0.5;font-size:0.95em;letter-spacing:1px;margin-top:5px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:25px;max-width:1200px;margin:0 auto}.card{background:var(--panel);backdrop-filter:blur(15px);border:1px solid var(--border);padding:30px;border-radius:24px;transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);position:relative;overflow:hidden}.card:hover{border-color:var(--accent);transform:translateY(-8px);background:rgba(255,255,255,0.08);box-shadow:0 20px 40px rgba(0,0,0,0.4)}.status-glow{width:10px;height:10px;background:#10b981;border-radius:50%;box-shadow:0 0 15px #10b981;display:inline-block;margin-right:12px}.role-tag{font-size:0.75rem;font-weight:600;text-transform:uppercase;color:var(--accent);letter-spacing:1px;display:block;margin-bottom:10px}.status-text{font-size:0.9rem;opacity:0.7;line-height:1.5}</style></head><body><header><div class="logo-area"><div class="logo-img"><img src="logo.png" alt="" style="width:80%;" onerror="this.style.display=\"none\";"></div><div><h1 style="margin:0;font-size:1.8rem;font-weight:800;letter-spacing:-0.5px">LAZY LOGIC <span style="color:var(--accent)">AI</span></h1><div class="tagline">AUTOMATE THE ORDINARY, ACHIEVE THE EXTRAORDINARY</div></div></div><div style="text-align:right"><div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;opacity:0.4;margin-bottom:5px">System Authority</div><strong>CHAIRMAN PANEL</strong><div style="color:#10b981;font-size:0.8rem;margin-top:5px">● OPERATIONAL</div></div></header><div id="grid" class="grid"></div><script>async function loadBots(){try{const r=await fetch("manifest.json?v="+Date.now());const d=await r.json();const g=document.getElementById("grid");g.innerHTML="";d.bot_roster.forEach(b=>{const c=document.createElement("div");c.className="card";c.innerHTML=`<div class="role-tag">${b.role}</div><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:15px\"><strong style=\"font-size:1.2rem\">${b.id}</strong><div class="status-glow"></div></div><div class="status-text">${b.status}</div>`;g.appendChild(c);});}catch(e){document.getElementById("grid").innerHTML="<div style=\"grid-column:1/-1;text-align:center;opacity:0.5\">INITIALIZING BOT ROSTER...</div>";}}loadBots();</script></body></html>
