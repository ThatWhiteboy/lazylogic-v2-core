<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lazy Logic AI | Command Center</title><style>:root{--bg:#0a0a0c;--panel:#16161a;--accent:#3b82f6;--text:#e2e8f0;--tagline:#94a3b8}body{background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;margin:0;padding:40px;display:flex;flex-direction:column;align-items:center}header{width:100%;max-width:1200px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2d2d33;padding-bottom:20px;margin-bottom:40px}.logo-box{display:flex;align-items:center;gap:15px}.logo-img{width:60px;height:60px;background:#2d2d33;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--accent)}.tagline{color:var(--tagline);font-style:italic;font-size:0.9em;letter-spacing:1px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;width:100%;max-width:1200px}.card{background:var(--panel);border:1px solid #2d2d33;padding:24px;border-radius:16px;position:relative;transition:all 0.3s ease}.card:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,0.5)}.status-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:8px;box-shadow:0 0 10px var(--accent)}.role{font-size:0.8em;color:var(--tagline);text-transform:uppercase;margin-top:4px;display:block}</style></head><body><header><div class="logo-box"><img src="logo.png" alt="Robot Logo" class="logo-img" onerror="this.src=\"https://via.placeholder.com/60?text=ROBOT\""><div><h2 style="margin:0">LAZY LOGIC AI</h2><span class="tagline">AUTOMATE THE ORDINARY, ACHIEVE THE EXTRAORDINARY</span></div></div><div style="text-align:right"><span style="font-size:0.8em;opacity:0.5">CHAIRMAN VIEW</span><br><strong>OPERATIONAL</strong></div></header><div id="grid" class="grid"></div><script>fetch("manifest.json?v=" + new Date().getTime()).then(r=>r.json()).then(d=>{const g=document.getElementById("grid");d.bot_roster.forEach(b=>{const c=document.createElement("div");c.className="card";c.innerHTML=`<div style="display:flex;justify-content:space-between"><strong>${b.id}</strong><div class="status-dot"></div></div><span class="role">${b.role}</span><p style="font-size:0.85em;margin-top:15px;opacity:0.8">${b.status.toUpperCase()}</p>`;g.appendChild(c);});})</script></body></html>
